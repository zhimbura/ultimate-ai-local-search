<svg viewBox="0 0 680 476" width="680" height="476" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="t d" font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, sans-serif">
  <title id="t">Deployment architecture — what runs where</title>
  <desc id="d">On the local machine: an AI agent calls ast-index (CLI), rg/grep (CLI), and the claude-context MCP server (Node 22). claude-context sends HTTP embedding requests to a local Ollama or LM Studio, or optionally to a cloud API, and talks gRPC on port 19530 to Milvus, which runs in Docker alongside etcd and minio.</desc>
  <defs>
    <marker id="a" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#64748b"/></marker>
    <marker id="ai" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#6366f1"/></marker>
  </defs>

  <rect x="0.5" y="0.5" width="679" height="475" rx="14" fill="#ffffff" stroke="#e2e8f0" stroke-width="1"/>
  <text x="20" y="27" font-size="16" font-weight="700" fill="#0f172a">Deployment — what runs where</text>

  <!-- Cloud boundary -->
  <rect x="470" y="44" width="196" height="80" rx="10" fill="#fffbeb" stroke="#f59e0b" stroke-width="1.4" stroke-dasharray="5 4"/>
  <text x="482" y="62" font-size="11.5" font-weight="700" fill="#92400e">☁ Cloud — optional embedder</text>
  <rect x="482" y="72" width="172" height="42" rx="8" fill="#fef3c7" stroke="#f59e0b" stroke-width="1.2"/>
  <text x="568" y="91" text-anchor="middle" font-size="10.5" font-weight="600" fill="#713f12">OpenAI · VoyageAI</text>
  <text x="568" y="104" text-anchor="middle" font-size="10.5" fill="#92400e">Gemini · OpenRouter</text>

  <!-- Local machine boundary -->
  <rect x="14" y="150" width="652" height="306" rx="12" fill="#f8fafc" stroke="#334155" stroke-width="1.8"/>
  <text x="30" y="172" font-size="13" font-weight="700" fill="#0f172a">💻 Local machine</text>

  <!-- Agent -->
  <rect x="30" y="186" width="176" height="50" rx="9" fill="#ffffff" stroke="#475569" stroke-width="1.6"/>
  <text x="118" y="207" text-anchor="middle" font-size="13" font-weight="700" fill="#0f172a">AI Agent</text>
  <text x="118" y="223" text-anchor="middle" font-size="10" fill="#64748b">Claude Code · Cursor</text>

  <!-- ast-index (tier) -->
  <rect x="246" y="184" width="200" height="44" rx="9" fill="#eef2ff" stroke="#6366f1" stroke-width="1.5"/>
  <text x="258" y="205" font-size="12" font-weight="700" fill="#312e81">Tier 1 · ast-index</text>
  <text x="258" y="220" font-size="9.5" fill="#4f46e5">CLI + SQLite · symbols</text>

  <!-- rg/grep (tier) -->
  <rect x="246" y="236" width="200" height="38" rx="9" fill="#eef2ff" stroke="#6366f1" stroke-width="1.5"/>
  <text x="258" y="259" font-size="12" font-weight="700" fill="#312e81">Tier 3 · rg / grep</text>

  <!-- claude-context (tier, hero) -->
  <rect x="246" y="300" width="200" height="58" rx="9" fill="#e0e7ff" stroke="#6366f1" stroke-width="2.4"/>
  <text x="258" y="322" font-size="12" font-weight="700" fill="#312e81">Tier 2 · claude-context</text>
  <text x="258" y="337" font-size="9.5" fill="#4f46e5">MCP server</text>
  <text x="258" y="350" font-size="9.5" fill="#4f46e5">npx · Node 22+</text>

  <!-- Embedder (infra) -->
  <rect x="30" y="300" width="186" height="58" rx="9" fill="#ecfdf5" stroke="#10b981" stroke-width="1.6"/>
  <text x="42" y="322" font-size="12" font-weight="700" fill="#064e3b">Embedder · local</text>
  <text x="42" y="337" font-size="9.5" fill="#047857">Ollama :11434</text>
  <text x="42" y="350" font-size="9.5" fill="#047857">or LM Studio :1234</text>

  <!-- Docker boundary -->
  <rect x="470" y="232" width="184" height="208" rx="10" fill="#f0f9ff" stroke="#0284c7" stroke-width="1.5" stroke-dasharray="5 4"/>
  <text x="482" y="252" font-size="11.5" font-weight="700" fill="#075985">🐳 Docker · Milvus</text>
  <rect x="482" y="262" width="160" height="44" rx="8" fill="#ecfdf5" stroke="#10b981" stroke-width="1.6"/>
  <text x="562" y="281" text-anchor="middle" font-size="12" font-weight="700" fill="#064e3b">milvus</text>
  <text x="562" y="295" text-anchor="middle" font-size="9.5" fill="#047857">:19530 gRPC · :9091</text>
  <rect x="482" y="318" width="75" height="40" rx="8" fill="#ffffff" stroke="#94a3b8" stroke-width="1.3"/>
  <text x="519" y="342" text-anchor="middle" font-size="11" font-weight="600" fill="#334155">etcd</text>
  <rect x="567" y="318" width="75" height="40" rx="8" fill="#ffffff" stroke="#94a3b8" stroke-width="1.3"/>
  <text x="604" y="342" text-anchor="middle" font-size="11" font-weight="600" fill="#334155">minio</text>

  <!-- edges -->
  <path d="M206,200 L244,200" fill="none" stroke="#64748b" stroke-width="1.4" marker-end="url(#a)"/>
  <text x="210" y="194" font-size="9" fill="#64748b">CLI</text>
  <path d="M206,214 C224,214 226,252 244,254" fill="none" stroke="#64748b" stroke-width="1.4" marker-end="url(#a)"/>
  <path d="M150,236 C150,290 246,300 270,300" fill="none" stroke="#6366f1" stroke-width="2" marker-end="url(#ai)"/>
  <text x="150" y="272" font-size="9.5" font-weight="600" fill="#4f46e5">MCP · stdio</text>
  <path d="M246,330 L218,330" fill="none" stroke="#6366f1" stroke-width="2" marker-end="url(#ai)"/>
  <text x="118" y="376" text-anchor="middle" font-size="9" fill="#047857">HTTP embeddings</text>
  <path d="M446,322 C460,322 466,290 480,286" fill="none" stroke="#6366f1" stroke-width="2" marker-end="url(#ai)"/>
  <text x="450" y="312" font-size="9" font-weight="600" fill="#4f46e5">gRPC :19530</text>
  <path d="M392,300 C412,250 452,140 552,116" fill="none" stroke="#94a3b8" stroke-width="1.4" stroke-dasharray="4 3" marker-end="url(#a)"/>
  <text x="466" y="198" font-size="9" fill="#92400e">HTTPS (if cloud)</text>
  <path d="M540,306 L525,316" fill="none" stroke="#64748b" stroke-width="1.2" marker-end="url(#a)"/>
  <path d="M585,306 L600,316" fill="none" stroke="#64748b" stroke-width="1.2" marker-end="url(#a)"/>

  <text x="20" y="470" font-size="9.5" fill="#64748b">Solid = always-on · dotted = cloud alternative to the local embedder · etcd/minio are Milvus's internal deps</text>
</svg>
